name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  notify_start:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord - Start
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"username\": \"CI/CD Bot\",
            \"embeds\": [{
              \"title\": \"🚀 Workflow Started\",
              \"description\": \"👤 Pushed by: ${{ github.actor }}\n🌿 Branch: ${{ github.ref_name }}\n📝 Commit: ${{ github.event.head_commit.message }}\n🔗 Repo: https://github.com/${{ github.repository }}\n⚙️ Job: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"color\": 16776960
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

  laravel-tests:
    needs: notify_start
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP 8.2
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, bcmath, pdo_sqlite

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install PHP Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test

  notify_end:
    runs-on: ubuntu-latest
    needs: laravel-tests
    if: always()
    steps:
      - name: Notify Discord - Success
        if: needs.laravel-tests.result == 'success'
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"username\": \"CI/CD Bot\",
            \"embeds\": [{
              \"title\": \"✅ Workflow Succeeded\",
              \"description\": \"👤 Pushed by: ${{ github.actor }}\n🌿 Branch: ${{ github.ref_name }}\n📝 Commit: ${{ github.event.head_commit.message }}\n🔗 Repo: https://github.com/${{ github.repository }}\n⚙️ Job: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"color\": 65280
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notify Discord - Failure
        if: needs.laravel-tests.result == 'failure'
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"username\": \"CI/CD Bot\",
            \"embeds\": [{
              \"title\": \"❌ Workflow Failed\",
              \"description\": \"👤 Pushed by: ${{ github.actor }}\n🌿 Branch: ${{ github.ref_name }}\n📝 Commit: ${{ github.event.head_commit.message }}\n🔗 Repo: https://github.com/${{ github.repository }}\n⚙️ Job: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"color\": 16711680
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
